<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leitor de Documentos OCR</title>

  <!-- Tesseract.js -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

  <!-- pdf.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    if (typeof pdfjsLib !== 'undefined') {
      pdfjsLib.GlobalWorkerOptions.workerSrc =
        'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    }
  </script>

  <!-- jsPDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <header class="site-header">
      <h1>⚡ OCR Document Reader</h1>
      <p>Envie um print ou foto da minuta — os dados são extraídos automaticamente.</p>
    </header>

    <hr class="divider">

    <!-- Seção 1: Upload -->
    <section aria-labelledby="upload-title">
      <h2 id="upload-title">1. Enviar Documento</h2>

      <div
        id="drop-zone"
        role="region"
        aria-label="Área de arrastar e soltar arquivo"
        tabindex="0"
      >
        <p>Arraste uma imagem ou PDF aqui</p>
        <span aria-hidden="true">ou</span>
        <button type="button" id="btn-select-file">Selecionar arquivo</button>
        <input
          type="file"
          id="file-input"
          accept=".png,.jpg,.jpeg,.pdf"
          aria-label="Selecionar arquivo de imagem ou PDF"
          hidden
        />
      </div>

      <p id="file-name" aria-live="polite"></p>

      <figure id="file-preview" hidden aria-label="Pré-visualização do arquivo selecionado">
        <img id="preview-img" src="" alt="Pré-visualização do documento enviado" />
      </figure>
    </section>

    <!-- Seção 2: Progresso -->
    <section id="status-area" aria-labelledby="status-title" hidden>
      <h2 id="status-title">2. Processamento</h2>

      <p id="status-text" role="status" aria-live="polite"></p>

      <div>
        <button type="button" id="toggle-raw" aria-expanded="false" aria-controls="raw-text-area">
          Ver texto bruto extraído
        </button>
      </div>

      <div id="raw-text-area" hidden>
        <label for="raw-text">Texto bruto extraído pelo OCR:</label>
        <textarea
          id="raw-text"
          readonly
          rows="8"
          aria-label="Texto bruto extraído pelo OCR"
        ></textarea>
      </div>
    </section>

    <!-- Seção 3: Formulário -->
    <hr class="divider">
    <section aria-labelledby="form-title">
      <h2 id="form-title">Dados Identificados</h2>

      <form id="declaration-form" novalidate>
        <div class="field-group">
          <label for="field-nome">Nome completo</label>
          <input type="text" id="field-nome" name="nome" autocomplete="name" placeholder="Nome completo do titular" />
        </div>

        <div class="fields-row">
          <div class="field-group">
            <label for="field-nacionalidade">Nacionalidade</label>
            <input type="text" id="field-nacionalidade" name="nacionalidade" placeholder="Ex: brasileiro(a)" />
          </div>
          <div class="field-group">
            <label for="field-estado-civil">Estado Civil</label>
            <input type="text" id="field-estado-civil" name="estadoCivil" placeholder="Ex: solteiro(a)" />
          </div>
          <div class="field-group">
            <label for="field-profissao">Profissão</label>
            <input type="text" id="field-profissao" name="profissao" placeholder="Ex: vendedor" />
          </div>
        </div>

        <div class="fields-row">
          <div class="field-group">
            <label for="field-rg">RG</label>
            <input type="text" id="field-rg" name="rg" autocomplete="off" placeholder="Número do RG" />
          </div>
          <div class="field-group">
            <label for="field-cpf">CPF</label>
            <input type="text" id="field-cpf" name="cpf" autocomplete="off" placeholder="000.000.000-00" aria-describedby="cpf-error" />
            <span id="cpf-error" role="alert" aria-live="assertive" hidden>CPF inválido. Verifique o número.</span>
          </div>
        </div>

        <div class="fields-row">
          <div class="field-group" style="flex:2">
            <label for="field-rua">Rua</label>
            <input type="text" id="field-rua" name="rua" placeholder="Nome da rua" />
          </div>
          <div class="field-group">
            <label for="field-numero">Número</label>
            <input type="text" id="field-numero" name="numero" placeholder="S/N" />
          </div>
        </div>

        <div class="fields-row">
          <div class="field-group">
            <label for="field-complemento">Complemento</label>
            <input type="text" id="field-complemento" name="complemento" placeholder="Ex: Q B L 16" />
          </div>
          <div class="field-group">
            <label for="field-bairro">Bairro</label>
            <input type="text" id="field-bairro" name="bairro" placeholder="Bairro" />
          </div>
        </div>

        <div class="fields-row">
          <div class="field-group">
            <label for="field-cep">CEP</label>
            <input type="text" id="field-cep" name="cep" autocomplete="postal-code" placeholder="00000-000" />
          </div>
          <div class="field-group" style="flex:2">
            <label for="field-cidade">Cidade</label>
            <input type="text" id="field-cidade" name="cidade" placeholder="Cidade" />
          </div>
          <div class="field-group">
            <label for="field-uf">UF</label>
            <input type="text" id="field-uf" name="uf" placeholder="MS" maxlength="2" />
          </div>
        </div>

        <button type="button" id="btn-gerar">Gerar Declaração</button>
      </form>
    </section>

    <!-- Seção 4: Declaração -->
    <hr class="divider">
    <section id="declaration-area" aria-labelledby="declaration-title" hidden>
      <h2 id="declaration-title">4. Declaração Gerada</h2>

      <label for="declaration-text">Texto da declaração:</label>
      <textarea
        id="declaration-text"
        readonly
        rows="12"
        aria-label="Texto da declaração gerada"
      ></textarea>

      <div class="declaration-actions">
        <button type="button" id="btn-copy">Copiar texto</button>
        <button type="button" id="btn-download-pdf">Baixar PDF</button>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
